<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 700" width="2000" height="700">
  <defs>
    
    <linearGradient id="wmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899"></stop>
      <stop offset="55%" stop-color="#C56BE0"></stop>
      <stop offset="100%" stop-color="#A855F7"></stop>
    </linearGradient>
    <filter id="wmShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"></feGaussianBlur>
      <feOffset dx="0" dy="6" result="off"></feOffset>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"></feFuncA></feComponentTransfer>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>
  <text x="1000" y="460" text-anchor="middle" class="wm" font-size="340" fill="url(#wmGrad)" filter="url(#wmShadow)">Stitch &amp; Kit</text>
</svg>